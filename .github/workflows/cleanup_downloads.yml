name: Cleanup downloads and artifacts

on:
  workflow_dispatch:
    inputs:
      target_folder:
        description: "Folder to delete from the repository"
        required: true
        type: string
        default: "downloads"
      delete_downloads:
        description: "Delete downloaded files from the repo?"
        required: true
        type: choice
        options:
          - "yes"
          - "no"
        default: "yes"
      delete_artifacts:
        description: "Delete workflow artifacts?"
        required: true
        type: choice
        options:
          - "yes"
          - "no"
        default: "yes"
      artifact_name:
        description: "Artifact name to delete. Use all to delete every artifact."
        required: true
        type: string
        default: "all"

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        if: ${{ github.event.inputs.delete_downloads == 'yes' }}
        uses: actions/checkout@v4

      - name: Delete downloaded files from repository
        if: ${{ github.event.inputs.delete_downloads == 'yes' }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET_FOLDER="${{ github.event.inputs.target_folder }}"

          echo "Target folder: $TARGET_FOLDER"

          if [ -z "$TARGET_FOLDER" ]; then
            echo "ERROR: target_folder is empty."
            exit 1
          fi

          if [ "$TARGET_FOLDER" = "." ] || [ "$TARGET_FOLDER" = "/" ]; then
            echo "ERROR: Refusing to delete repository root."
            exit 1
          fi

          if [[ "$TARGET_FOLDER" == /* ]]; then
            echo "ERROR: Refusing to delete absolute path."
            exit 1
          fi

          if [[ "$TARGET_FOLDER" == *".."* ]]; then
            echo "ERROR: Refusing to delete path containing '..'."
            exit 1
          fi

          if [ "$TARGET_FOLDER" = ".git" ] || [ "$TARGET_FOLDER" = ".github" ]; then
            echo "ERROR: Refusing to delete protected folder: $TARGET_FOLDER"
            exit 1
          fi

          git rm -r --ignore-unmatch "$TARGET_FOLDER"
          rm -rf "$TARGET_FOLDER"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No tracked downloaded files found to delete."
          else
            git commit -m "Cleanup downloaded files [skip ci]"
            git push
          fi

      - name: Delete workflow artifacts
        if: ${{ github.event.inputs.delete_artifacts == 'yes' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ${{ github.event.inputs.artifact_name }}
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          api = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          artifact_name = os.environ.get("ARTIFACT_NAME", "all").strip()

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "github-actions-artifact-cleanup",
          }

          def request_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read().decode("utf-8"))

          def delete_artifact(artifact_id):
              url = f"{api}/repos/{repo}/actions/artifacts/{artifact_id}"
              req = urllib.request.Request(url, headers=headers, method="DELETE")
              with urllib.request.urlopen(req) as response:
                  return response.status

          all_artifacts = []
          page = 1

          while True:
              url = f"{api}/repos/{repo}/actions/artifacts?per_page=100&page={page}"
              data = request_json(url)
              artifacts = data.get("artifacts", [])

              if not artifacts:
                  break

              all_artifacts.extend(artifacts)

              if len(artifacts) < 100:
                  break

              page += 1

          if artifact_name.lower() in ("all", "*"):
              targets = all_artifacts
          else:
              targets = [
                  artifact
                  for artifact in all_artifacts
                  if artifact.get("name") == artifact_name
              ]

          print(f"Found {len(all_artifacts)} artifact(s).")
          print(f"Deleting {len(targets)} artifact(s).")

          deleted = 0

          for artifact in targets:
              artifact_id = artifact["id"]
              name = artifact.get("name", "unknown")

              try:
                  status = delete_artifact(artifact_id)
                  print(f"Deleted artifact: {name} ({artifact_id}), HTTP {status}")
                  deleted += 1
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", "replace")
                  print(f"Failed to delete artifact {name} ({artifact_id}): HTTP {error.code}")
                  print(body)

          print(f"Done. Deleted {deleted} artifact(s).")
          PY
