name: دانلودر پورن هاب

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL"
        required: true
        type: string
      desired_quality:
        description: "Video quality: 144, 240, 360, 480, 720, 1080"
        required: false
        type: string
        default: "720"
      max_part_mb:
        description: "Maximum part size in MB. Keep 90 for GitHub safety."
        required: false
        type: string
        default: "90"
      output_folder:
        description: "Folder where the video will be saved"
        required: false
        type: string
        default: "downloads"

permissions:
  contents: write

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 python3-pip ffmpeg p7zip-full git

          python3 -m pip install --user --upgrade pip

          # Install latest yt-dlp directly from GitHub master, not the older PyPI stable package.
          python3 -m pip install --user --upgrade --force-reinstall \
            "yt-dlp[default,curl-cffi] @ git+https://github.com/yt-dlp/yt-dlp.git"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          "$HOME/.local/bin/yt-dlp" --version
          ffmpeg -version | head -n 1

      - name: Prepare optional site cookies
        env:
          PH_COOKIES: ${{ secrets.PH_COOKIES }}
        run: |
          if [ -n "$PH_COOKIES" ]; then
            printf '%s\n' "$PH_COOKIES" > site_cookies.txt
            echo "Site cookies found in repository secrets."
          else
            echo "No site cookies secret found. Continuing without cookies."
          fi

      - name: Download video
        id: download
        shell: bash
        run: |
          set -euo pipefail

          URL="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.desired_quality }}"

          TMP_DIR="download_tmp"
          mkdir -p "$TMP_DIR"
          touch marker

          echo "URL: $URL"
          echo "Quality: $QUALITY"

          if [ -z "$URL" ]; then
            echo "ERROR: URL is empty."
            exit 1
          fi

          case "$QUALITY" in
            144|240|360|480|720|1080) ;;
            *) QUALITY="720" ;;
          esac

          COOKIE_ARGS=()
          if [ -s site_cookies.txt ]; then
            COOKIE_ARGS=(--cookies site_cookies.txt)
          fi

          FORMAT_SELECTOR="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]/best"

          COMMON_ARGS=(
            "${COOKIE_ARGS[@]}"
            --verbose
            --no-playlist
            --restrict-filenames
            --force-ipv4
            --geo-bypass
            --no-check-certificate
            --impersonate chrome
            --referer "https://www.pornhub.com/"
            --add-header "Accept-Language:en-US,en;q=0.9"
            --retries 10
            --fragment-retries 10
            --extractor-retries 5
            --socket-timeout 30
            --no-color
            --newline
          )

          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          NEW_FILE=""

          while [ "$RETRY_COUNT" -lt "$MAX_RETRIES" ]; do
            echo "Download attempt $((RETRY_COUNT + 1))/$MAX_RETRIES"

            if yt-dlp \
              "${COMMON_ARGS[@]}" \
              --format "$FORMAT_SELECTOR" \
              --merge-output-format mp4 \
              --output "$TMP_DIR/%(title).120B_%(id)s_${QUALITY}p.%(ext)s" \
              "$URL"; then

              NEW_FILE="$(find "$TMP_DIR" -type f ! -name "*.part" ! -name "*.ytdl" -print -quit || true)"

              if [ -n "$NEW_FILE" ]; then
                echo "Download succeeded: $NEW_FILE"
                SUCCESS=true
                break
              fi
            fi

            echo "Normal extractor failed. Trying generic fallback..."

            if yt-dlp \
              "${COMMON_ARGS[@]}" \
              --force-generic-extractor \
              --format "$FORMAT_SELECTOR" \
              --merge-output-format mp4 \
              --output "$TMP_DIR/%(title).120B_%(id)s_${QUALITY}p.%(ext)s" \
              "$URL"; then

              NEW_FILE="$(find "$TMP_DIR" -type f ! -name "*.part" ! -name "*.ytdl" -print -quit || true)"

              if [ -n "$NEW_FILE" ]; then
                echo "Generic fallback succeeded: $NEW_FILE"
                SUCCESS=true
                break
              fi
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))

            if [ "$RETRY_COUNT" -lt "$MAX_RETRIES" ]; then
              echo "Waiting 10 seconds before next attempt..."
              sleep 10
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "ERROR: All $MAX_RETRIES download attempts failed."
            echo "Possible causes:"
            echo "1. The site changed and yt-dlp needs an update."
            echo "2. The video is unavailable from GitHub Actions' IP region."
            echo "3. The site requires age/session cookies."
            echo "4. The page is blocked by anti-bot protection."
            exit 1
          fi

          FILE_SIZE_BYTES="$(stat -c%s "$NEW_FILE")"

          echo "Downloaded file:"
          ls -lh "$NEW_FILE"

          printf 'file_path=%s\n' "$NEW_FILE" >> "$GITHUB_OUTPUT"
          printf 'size_bytes=%s\n' "$FILE_SIZE_BYTES" >> "$GITHUB_OUTPUT"

      - name: Move or split oversized file
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          MAX_PART_MB="${{ github.event.inputs.max_part_mb }}"
          FILE_PATH="${{ steps.download.outputs.file_path }}"

          case "$MAX_PART_MB" in
            ''|*[!0-9]*) MAX_PART_MB="90" ;;
          esac

          if [ "$MAX_PART_MB" -lt 1 ]; then
            MAX_PART_MB="90"
          fi

          mkdir -p "$OUTPUT_FOLDER"

          FILE_SIZE_BYTES="$(stat -c%s "$FILE_PATH")"
          LIMIT_BYTES=$((MAX_PART_MB * 1024 * 1024))

          BASENAME="$(basename "$FILE_PATH")"
          ARCHIVE_BASE="${BASENAME%.*}"

          echo "File size: $FILE_SIZE_BYTES bytes"
          echo "Split limit: $MAX_PART_MB MB"

          if [ "$FILE_SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
            echo "File is larger than ${MAX_PART_MB} MB. Creating split 7z archive."

            7z a -t7z -mx=5 -v"${MAX_PART_MB}m" "$OUTPUT_FOLDER/${ARCHIVE_BASE}.7z" "$FILE_PATH"

            echo "Created split archive parts:"
            ls -lh "$OUTPUT_FOLDER"
          else
            echo "File is small enough. Moving directly to output folder."
            mv "$FILE_PATH" "$OUTPUT_FOLDER/"
            ls -lh "$OUTPUT_FOLDER"
          fi

          rm -rf download_tmp

      - name: Upload result as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-download
          path: ${{ github.event.inputs.output_folder }}/

      - name: Commit and push to repository
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FOLDER/"
          git commit -m "Add downloaded video [skip ci]" || echo "Nothing to commit"
          git push
