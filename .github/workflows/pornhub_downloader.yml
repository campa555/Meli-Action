name: دانلودر پورن هاب

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL"
        required: true
        type: string
      desired_quality:
        description: "Video quality: 144, 240, 360, 480, 720, 1080"
        required: false
        type: string
        default: "720"
      max_part_mb:
        description: "Maximum part size in MB. Keep 90 for GitHub safety."
        required: false
        type: string
        default: "90"
      output_folder:
        description: "Folder where the video will be saved"
        required: false
        type: string
        default: "downloads"

permissions:
  contents: write

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js runtime
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 python3-pip ffmpeg p7zip-full git curl

          python3 -m pip install --user --upgrade pip

          python3 -m pip install --user --upgrade --force-reinstall \
            "yt-dlp[default,curl-cffi] @ git+https://github.com/yt-dlp/yt-dlp.git" \
            yt-dlp-ejs

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          "$HOME/.local/bin/yt-dlp" --version
          ffmpeg -version | head -n 1
          node --version

      - name: Prepare optional site cookies
        env:
          PH_COOKIES: ${{ secrets.PH_COOKIES }}
        run: |
          if [ -n "$PH_COOKIES" ]; then
            printf '%s\n' "$PH_COOKIES" > site_cookies.txt
            echo "Site cookies found in repository secrets."
          else
            echo "No site cookies secret found. Continuing without cookies."
          fi

      - name: Download video
        id: download
        shell: bash
        run: |
          set -euo pipefail

          INPUT_URL="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.desired_quality }}"

          TMP_DIR="download_tmp"
          mkdir -p "$TMP_DIR"

          echo "Input URL: $INPUT_URL"
          echo "Requested quality: $QUALITY"

          if [ -z "$INPUT_URL" ]; then
            echo "ERROR: URL is empty."
            exit 1
          fi

          case "$QUALITY" in
            144|240|360|480|720|1080) ;;
            *) QUALITY="720" ;;
          esac

          COOKIE_ARGS=()
          CURL_COOKIE_ARGS=()

          if [ -s site_cookies.txt ]; then
            COOKIE_ARGS=(--cookies site_cookies.txt)
            CURL_COOKIE_ARGS=(-b site_cookies.txt)
          fi

          VIEWKEY=""

          if [[ "$INPUT_URL" =~ viewkey=([^&]+) ]]; then
            VIEWKEY="${BASH_REMATCH[1]}"
          fi

          CANDIDATE_URLS=()
          CANDIDATE_URLS+=("$INPUT_URL")

          if [ -n "$VIEWKEY" ]; then
            CANDIDATE_URLS+=("https://www.pornhub.com/embed/${VIEWKEY}")
            CANDIDATE_URLS+=("https://m.pornhub.com/view_video.php?viewkey=${VIEWKEY}")
          fi

          echo "Candidate URLs:"
          printf '%s\n' "${CANDIDATE_URLS[@]}"

          echo "Checking redirects/access without printing page body..."
          for candidate in "${CANDIDATE_URLS[@]}"; do
            echo "----"
            echo "Checking: $candidate"
            curl \
              -L \
              -sS \
              -o /dev/null \
              -w "HTTP code: %{http_code}\nFinal URL: %{url_effective}\n" \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
              -e "https://www.pornhub.com/" \
              -H "Accept-Language: en-US,en;q=0.9" \
              "${CURL_COOKIE_ARGS[@]}" \
              "$candidate" || true
          done

          FORMAT_SELECTOR="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]/best"

          COMMON_ARGS=(
            "${COOKIE_ARGS[@]}"
            --verbose
            --no-playlist
            --restrict-filenames
            --force-ipv4
            --geo-bypass
            --no-check-certificate
            --impersonate chrome
            --referer "https://www.pornhub.com/"
            --add-header "Accept-Language:en-US,en;q=0.9"
            --retries 10
            --fragment-retries 10
            --extractor-retries 5
            --socket-timeout 30
            --no-color
            --newline
            --js-runtimes node
          )

          SUCCESS=false
          NEW_FILE=""

          for candidate in "${CANDIDATE_URLS[@]}"; do
            echo "========================================"
            echo "Trying candidate URL: $candidate"
            echo "========================================"

            for attempt in 1 2 3; do
              echo "Download attempt $attempt/3 for this candidate"

              if yt-dlp \
                "${COMMON_ARGS[@]}" \
                --format "$FORMAT_SELECTOR" \
                --merge-output-format mp4 \
                --output "$TMP_DIR/%(title).120B_%(id)s_${QUALITY}p.%(ext)s" \
                "$candidate"; then

                NEW_FILE="$(find "$TMP_DIR" -type f ! -name "*.part" ! -name "*.ytdl" -print -quit || true)"

                if [ -n "$NEW_FILE" ]; then
                  echo "Download succeeded: $NEW_FILE"
                  SUCCESS=true
                  break 2
                fi
              fi

              echo "Normal extractor failed. Trying generic fallback..."

              if yt-dlp \
                "${COMMON_ARGS[@]}" \
                --force-generic-extractor \
                --format "$FORMAT_SELECTOR" \
                --merge-output-format mp4 \
                --output "$TMP_DIR/%(title).120B_%(id)s_${QUALITY}p.%(ext)s" \
                "$candidate"; then

                NEW_FILE="$(find "$TMP_DIR" -type f ! -name "*.part" ! -name "*.ytdl" -print -quit || true)"

                if [ -n "$NEW_FILE" ]; then
                  echo "Generic fallback succeeded: $NEW_FILE"
                  SUCCESS=true
                  break 2
                fi
              fi

              if [ "$attempt" -lt 3 ]; then
                echo "Waiting 10 seconds before next attempt..."
                sleep 10
              fi
            done
          done

          if [ "$SUCCESS" = false ]; then
            echo "ERROR: Download failed for all candidate URLs."
            echo ""
            echo "Look above at the redirect/access check."
            echo "If every candidate ends with Final URL: https://www.pornhub.com/"
            echo "then GitHub Actions is being redirected away from the video page."
            echo ""
            echo "Possible causes:"
            echo "1. Cookies are valid locally but not enough for GitHub's datacenter IP."
            echo "2. The video is unavailable from GitHub's region/IP."
            echo "3. The site is showing an age/consent/bot/region page."
            echo "4. yt-dlp's PornHub extractor is currently broken for this page."
            exit 1
          fi

          FILE_SIZE_BYTES="$(stat -c%s "$NEW_FILE")"

          echo "Downloaded file:"
          ls -lh "$NEW_FILE"

          printf 'file_path=%s\n' "$NEW_FILE" >> "$GITHUB_OUTPUT"
          printf 'size_bytes=%s\n' "$FILE_SIZE_BYTES" >> "$GITHUB_OUTPUT"

      - name: Move or split oversized file
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          MAX_PART_MB="${{ github.event.inputs.max_part_mb }}"
          FILE_PATH="${{ steps.download.outputs.file_path }}"

          case "$MAX_PART_MB" in
            ''|*[!0-9]*) MAX_PART_MB="90" ;;
          esac

          if [ "$MAX_PART_MB" -lt 1 ]; then
            MAX_PART_MB="90"
          fi

          mkdir -p "$OUTPUT_FOLDER"

          FILE_SIZE_BYTES="$(stat -c%s "$FILE_PATH")"
          LIMIT_BYTES=$((MAX_PART_MB * 1024 * 1024))

          BASENAME="$(basename "$FILE_PATH")"
          ARCHIVE_BASE="${BASENAME%.*}"

          echo "File size: $FILE_SIZE_BYTES bytes"
          echo "Split limit: $MAX_PART_MB MB"

          if [ "$FILE_SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
            echo "File is larger than ${MAX_PART_MB} MB. Creating split 7z archive."

            7z a -t7z -mx=5 -v"${MAX_PART_MB}m" "$OUTPUT_FOLDER/${ARCHIVE_BASE}.7z" "$FILE_PATH"

            echo "Created split archive parts:"
            ls -lh "$OUTPUT_FOLDER"
          else
            echo "File is small enough. Moving directly to output folder."
            mv "$FILE_PATH" "$OUTPUT_FOLDER/"
            ls -lh "$OUTPUT_FOLDER"
          fi

          rm -rf download_tmp

      - name: Upload result as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-download
          path: ${{ github.event.inputs.output_folder }}/

      - name: Commit and push to repository
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FOLDER/"
          git commit -m "Add downloaded video [skip ci]" || echo "Nothing to commit"
          git push
